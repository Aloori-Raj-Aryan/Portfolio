<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aloori Raj Aryan</title>
    <meta
      name="description"
      content="Introduction — Aloori Raj Aryan portfolio."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      (function () {
        try {
          var k = "portfolio-theme";
          var s = localStorage.getItem(k);
          if (s === "light" || s === "dark") {
            document.documentElement.setAttribute("data-theme", s);
          } else {
            document.documentElement.setAttribute("data-theme", "light");
          }
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="./index.html">Aloori Raj Aryan</a>
        <nav class="nav">
          <a href="./index.html" aria-current="page">Introduction</a>
          <a href="./projects.html">Projects</a>
          <a href="./media.html">Media</a>
          <a href="./contact.html">Contact</a>
        </nav>
        <div class="header-end">
          <label class="theme-switch">
            <span class="theme-switch__label">Night</span>
            <span class="theme-switch__wrap">
              <input
                type="checkbox"
                class="theme-switch__input"
                id="theme-switch-input"
                role="switch"
                aria-checked="false"
                aria-label="Night mode"
              />
              <span class="theme-switch__track" aria-hidden="true">
                <span class="theme-switch__thumb"></span>
              </span>
            </span>
          </label>
          <button class="menu-btn" aria-label="Toggle menu">Menu</button>
        </div>
      </div>
    </header>

    <main id="home" class="page-home">
      <section id="introduction" class="section">
        <div class="container intro-split">
          <div class="intro-photo card image-card">
            <img id="intro-hero-image" src="" alt="" />
          </div>
          <div class="intro-copy">
            <h2>Introduction</h2>
            <div id="introduction-body" class="intro-body section-text"></div>
            <p id="introduction-error" class="section-text hidden" role="alert"></p>
          </div>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
