<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media | Aloori Raj Aryan</title>
    <meta name="description" content="Featured media — Aloori Raj Aryan portfolio." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      (function () {
        try {
          var k = "portfolio-theme";
          var s = localStorage.getItem(k);
          if (s === "light" || s === "dark") {
            document.documentElement.setAttribute("data-theme", s);
          } else {
            document.documentElement.setAttribute("data-theme", "light");
          }
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="./index.html">Aloori Raj Aryan</a>
        <nav class="nav">
          <a href="./index.html">Introduction</a>
          <a href="./projects.html">Projects</a>
          <a href="./media.html" aria-current="page">Media</a>
          <a href="./contact.html">Contact</a>
        </nav>
        <div class="header-end">
          <label class="theme-switch">
            <span class="theme-switch__label">Night</span>
            <span class="theme-switch__wrap">
              <input
                type="checkbox"
                class="theme-switch__input"
                id="theme-switch-input"
                role="switch"
                aria-checked="false"
                aria-label="Night mode"
              />
              <span class="theme-switch__track" aria-hidden="true">
                <span class="theme-switch__thumb"></span>
              </span>
            </span>
          </label>
          <button class="menu-btn" aria-label="Toggle menu">Menu</button>
        </div>
      </div>
    </header>

    <main>
      <section id="media" class="section">
        <div class="container">
          <h2>Featured Video</h2>
          <p class="section-text">
            Place your showcase video in <code>assets/videos/</code> and update
            the file name below.
          </p>
          <div class="card video-card">
            <video controls preload="metadata" poster="./assets/images/video-poster.jpg">
              <source src="./assets/videos/showreel-placeholder.mp4" type="video/mp4" />
              Your browser does not support the video tag.
            </video>
          </div>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
